services:
  backend:
    container_name: sickyeah-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      # DATABASE_URL 从 .env 文件读取，格式：mysql://用户名:密码@主机:3306/数据库名
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
